classify_ticket:
  description: >
    Analyze the incoming support ticket and classify it into:
    - intent (billing, technical, feature, bug)
    - urgency (low, medium, high)
    - sentiment (positive, neutral, negative)

    Use only the user message as input.
  expected_output: >
    Structured classification JSON with intent, urgency, and sentiment.
  agent: triage_agent

fetch_billing_data:
  description: >
    If the ticket is related to billing, retrieve user billing information
    and detect anomalies such as duplicate charges or failed payments.
    Use available billing tools if required.
  expected_output: >
    Billing data summary including charges and detected issues.
  agent: billing_agent

generate_response:
  description: >
    Generate a customer support response using:
    - ticket classification
    - billing/context data (if available)

    Ensure:
    - Accurate reasoning based on data
    - Empathetic tone
    - Clear next steps for the user
  expected_output: >
    A structured support response with message and confidence score.
  agent: resolution_agent

qa_review:
  description: >
    Review the generated response for:
    - factual correctness
    - hallucinations
    - tone appropriateness
    - policy compliance

    Approve or reject the response with issues if found.
  expected_output: >
    QA decision (approved/rejected) with optional issues list.
  agent: qa_agent